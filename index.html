<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Python Module Quiz</title>
<style>
:root {
  --primary: #00a896;
  --primary-dark: #008a7a;
  --primary-light: #00c9a7;
  --bg: #f0faf8;
  --white: #ffffff;
  --dark: #1a1a2e;
  --text: #333333;
  --gray: #888888;
  --border: #e8edf2;
  --card-bg: #e0f7f4;
  --card-border: #99e6dc;
  --success: #16a34a;
  --success-bg: #dcfce7;
  --error: #dc2626;
  --error-bg: #fee2e2;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

/* ===== SCREEN SYSTEM ===== */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  background: var(--bg);
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* ===== COMMON PARTS ===== */
.gradient-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white;
  padding: env(safe-area-inset-top, 0) 0 0;
  flex-shrink: 0;
}
.gradient-header-inner {
  padding: 52px 20px 24px;
  text-align: center;
}

.screen-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px 110px;
}

.bottom-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

/* ===== BUTTONS ===== */
.btn {
  padding: 16px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.3px;
  line-height: 1;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  flex: 2;
}
.btn-primary:disabled {
  background: var(--border);
  color: var(--gray);
}
.btn-secondary {
  background: var(--white);
  color: var(--primary);
  border: 2px solid var(--primary);
  flex: 1;
}
.btn-full { width: 100%; flex: none; }

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ===== HOME SCREEN ===== */
.app-title {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.app-title span { color: #a0ede5; }
.app-tagline { font-size: 13px; opacity: 0.9; margin-top: 4px; }

.stats-row {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-top: 16px;
}
.stat-num { font-size: 22px; font-weight: 800; }
.stat-label { font-size: 10px; opacity: 0.85; margin-top: 2px; }

.module-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.module-card:active {
  background: var(--bg);
  border-color: var(--primary);
}
.module-num {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 13px;
  flex-shrink: 0;
}
.module-info { flex: 1; min-width: 0; }
.module-name { font-size: 14px; font-weight: 700; color: var(--dark); }
.module-desc { font-size: 11px; color: var(--gray); margin-top: 2px; }
.module-arrow { color: #ccc; font-size: 20px; font-weight: 300; }

/* ===== QUIZ SCREEN ===== */
.quiz-header {
  background: var(--white);
  padding-top: env(safe-area-inset-top, 0);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.quiz-header-inner {
  padding: 52px 20px 14px;
}
.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label { font-size: 13px; color: var(--gray); font-weight: 600; }
.module-tag {
  background: var(--card-bg);
  color: var(--primary);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 99px;
}
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 99px;
  transition: width 0.3s ease;
}

.question-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.65;
  margin-bottom: 24px;
  white-space: pre-wrap;
}

.option-btn {
  width: 100%;
  padding: 16px 18px;
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 14px;
  text-align: left;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 500;
  font-family: inherit;
  line-height: 1.4;
  transition: border-color 0.15s, background 0.15s;
}
.option-key {
  width: 30px;
  height: 30px;
  background: #f0f4f8;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 13px;
  color: var(--primary);
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.option-btn.selected { border-color: var(--primary); background: #f0faf8; }
.option-btn.selected .option-key { background: var(--primary); color: white; }
.option-btn.correct-ans { border-color: var(--success); background: var(--success-bg); }
.option-btn.correct-ans .option-key { background: var(--success); color: white; }
.option-btn.wrong-ans { border-color: var(--error); background: var(--error-bg); }
.option-btn.wrong-ans .option-key { background: var(--error); color: white; }

/* ===== FEEDBACK SCREEN ===== */
.feedback-header {
  background: var(--white);
  padding-top: env(safe-area-inset-top, 0);
  text-align: center;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.feedback-header-inner { padding: 48px 20px 20px; }

.result-icon {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  font-size: 30px;
}
.result-icon.correct { background: var(--success-bg); }
.result-icon.wrong { background: var(--error-bg); }
.result-label { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.result-label.correct { color: var(--success); }
.result-label.wrong { color: var(--error); }
.correct-answer-note { font-size: 13px; color: var(--gray); }

.review-box {
  background: #f8fafc;
  border-radius: 12px;
  padding: 13px 16px;
  margin-bottom: 10px;
}
.review-lbl { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; margin-bottom: 4px; }
.review-val { font-size: 14px; font-weight: 700; color: var(--dark); }
.review-val.correct { color: var(--success); }
.review-val.wrong { color: var(--error); }

.claude-card {
  background: linear-gradient(135deg, #f0faf8, var(--card-bg));
  border: 1.5px solid var(--card-border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.claude-card-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.claude-icon {
  width: 26px;
  height: 26px;
  background: var(--primary);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 10px;
  font-weight: 800;
  flex-shrink: 0;
}
.claude-card-title { font-size: 12px; font-weight: 700; color: var(--primary); }
.claude-card-text { font-size: 13px; color: var(--text); line-height: 1.7; }

/* ===== RESULTS SCREEN ===== */
.results-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white;
  padding-top: env(safe-area-inset-top, 0);
  flex-shrink: 0;
}
.results-header-inner { padding: 40px 20px 20px; text-align: center; }

.score-circle {
  width: 110px;
  height: 110px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 50%;
  border: 4px solid rgba(255, 255, 255, 0.4);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
}
.score-num { font-size: 36px; font-weight: 900; line-height: 1; }
.score-denom { font-size: 13px; opacity: 0.8; }
.score-pct { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.score-msg { font-size: 13px; opacity: 0.9; }

.weak-item {
  background: var(--white);
  border: 1.5px solid #fecaca;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.weak-dot { width: 8px; height: 8px; background: var(--error); border-radius: 50%; flex-shrink: 0; }
.weak-text { font-size: 13px; color: var(--text); font-weight: 600; }

/* ===== LOADING / ERROR ===== */
.center-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  padding: 32px;
  text-align: center;
}
.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid var(--card-bg);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { color: var(--gray); font-size: 14px; }
.error-icon { font-size: 48px; }
.error-title { font-size: 18px; font-weight: 700; color: var(--dark); }
.error-msg { font-size: 14px; color: var(--gray); line-height: 1.6; }

/* ===== CODE BLOCKS ===== */
.question-body { margin-bottom: 0; }
.question-body .qt {
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.65;
  margin-bottom: 14px;
  white-space: pre-wrap;
}
.code-block {
  background: #1e2235;
  color: #a0ede5;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
  overflow-x: auto;
  margin-bottom: 20px;
  border-left: 3px solid var(--primary);
  line-height: 1.7;
  white-space: pre;
}
.question-sub {
  font-size: 13px;
  color: var(--gray);
  margin-bottom: 16px;
}

/* ===== CHARACTER MINI (FEEDBACK) ===== */
.char-mini {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
  padding: 10px 18px 10px 10px;
  background: var(--card-bg);
  border-radius: 18px;
  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}
.char-mini canvas {
  width: 120px;
  height: 120px;
  flex-shrink: 0;
}
.char-mini-info { display: flex; flex-direction: column; gap: 2px; }
.char-mini-name { font-size: 16px; font-weight: 900; color: var(--primary-dark); }
.char-mini-stage { font-size: 10px; font-weight: 700; color: var(--primary); letter-spacing: 1.8px; text-transform: uppercase; margin-top: 1px; }
.char-mini-score { font-size: 13px; color: var(--gray); margin-top: 8px; }

/* ===== CHARACTER SHOWCASE (RESULTS) ===== */
.char-showcase { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; }
.char-showcase canvas {
  width: 160px;
  height: 160px;
  animation: charReveal 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.char-showcase-name {
  font-size: 24px;
  font-weight: 900;
  color: white;
  margin-top: 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.35);
  letter-spacing: -0.3px;
}
.char-showcase-stage {
  font-size: 11px;
  opacity: 0.72;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 4px;
}
@keyframes charReveal {
  0%   { transform: scale(0.2) translateY(30px); opacity: 0; }
  55%  { transform: scale(1.12) translateY(-8px); opacity: 1; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
.score-inline {
  display: flex;
  align-items: baseline;
  gap: 3px;
  justify-content: center;
  margin: 12px 0 4px;
}
.score-inline-num  { font-size: 46px; font-weight: 900; line-height: 1; }
.score-inline-sep  { font-size: 22px; opacity: 0.65; }
.score-inline-tot  { font-size: 22px; opacity: 0.75; }
.score-inline-pct  { font-size: 26px; font-weight: 800; margin-left: 10px; opacity: 0.92; }

/* ===== DESKTOP ===== */
@media (min-width: 480px) {
  html, body {
    background: #c8ede8;
    overflow: auto;
  }
  #app {
    height: 100vh;
    box-shadow: 0 12px 60px rgba(0, 0, 0, 0.2);
  }
}
</style>
</head>
<body>
<div id="app">
  <div class="screen active">
    <div class="center-screen">
      <div class="spinner"></div>
      <div class="loading-msg">データを読み込み中...</div>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
let allModules = [];
let feedbackData = {};

// ===== AURA ANIMATION =====
let auraAnimId  = null;
let auraTimerId = null;

function stopAura() {
  if (auraAnimId)  { cancelAnimationFrame(auraAnimId);  auraAnimId  = null; }
  if (auraTimerId) { clearTimeout(auraTimerId);          auraTimerId = null; }
}

// ===== QUIZ STATE =====
let quiz = {
  title: '',
  moduleTag: '',
  questions: [],
  index: 0,
  selected: null,
  score: 0,
  weakTopics: [],
  startParams: { moduleIds: null, title: '' },
};

// ===== UTILITIES =====
function h(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render(html) {
  stopAura();
  document.getElementById('app').innerHTML = html;
}

function getFeedback(moduleId, questionId) {
  return feedbackData[`${moduleId}_${questionId}`]
    || 'この問題の解説を読み込めませんでした。';
}

function getSummary(pct) {
  const s = feedbackData.summaries || {};
  if (pct >= 95) return s.excellent || '完璧です！この調子で頑張りましょう！';
  if (pct >= 70) return s.good    || '素晴らしい成績です！';
  if (pct >= 50) return s.okay    || 'もう少しです！復習してみましょう。';
  return s.needs_review || '基礎をしっかり固めてもう一度チャレンジ！';
}

function parseTitle(title) {
  const m = title.match(/Module\s+(\d+)[:\s]+(.+?)\s*[-–]\s*(.+)/);
  if (m) return { num: m[1], name: m[2], desc: m[3] };
  const m2 = title.match(/Module\s+(\d+)[:\s]+(.+)/);
  if (m2) return { num: m2[1], name: m2[2], desc: '' };
  return { num: '?', name: title, desc: '' };
}

// ===== CHARACTER EVOLUTION (PIXEL ART) =====
const PAL = [
  '#1a1a1a', // 0: black
  '#ffffff', // 1: white
  '#ffd5b5', // 2: skin
  '#e8a882', // 3: skin shadow
  '#4a2810', // 4: dark brown
  '#f5d060', // 5: yellow
  '#00a896', // 6: teal
  '#f0c040', // 7: gold
  '#a8b8c8', // 8: silver
  '#d83030', // 9: red
  '#2860c0', // 10: blue
  '#28a028', // 11: green
  '#7830b0', // 12: purple
  '#e06820', // 13: orange
  '#182050', // 14: dark navy
  '#f0e8d8', // 15: glow/white-gold
];

const STAGE_NAMES = [
  '赤ちゃん', '幼稚園児', '小学生', '中学生', '高校生',
  '見習い剣士', '勇者', 'エリート勇者', 'Python勇者', 'Pythonキング',
  '全知全能のpython神'
];

function _p(ctx, S, ci, x, y, w, h) {
  ctx.fillStyle = PAL[ci];
  ctx.fillRect(x*S, y*S, w*S, h*S);
}

const STAGE_DRAW = [
  // 0: 赤ちゃん
  function(ctx, S) {
    const p = (ci,x,y,w,h) => _p(ctx,S,ci,x,y,w,h);
    p(4, 12,4,8,3);                           // hair
    p(2, 11,5,10,9); p(2,10,7,1,5); p(2,21,7,1,5); // head
    p(0, 13,9,2,2); p(0,17,9,2,2);            // eyes
    p(9, 12,11,2,1); p(9,18,11,2,1);          // cheeks
    p(0, 15,12,2,1);                           // mouth
    p(1, 12,15,8,6); p(2,11,14,10,1);         // diaper body
    p(8, 15,15,2,6);                           // diaper line
    p(2, 9,15,3,4); p(2,20,15,3,4);           // arms
    p(2, 12,21,3,5); p(2,17,21,3,5);          // legs
    p(3, 11,25,5,2); p(3,16,25,5,2);          // feet
  },
  // 1: 幼稚園児
  function(ctx, S) {
    const p = (ci,x,y,w,h) => _p(ctx,S,ci,x,y,w,h);
    p(4, 11,3,10,4); p(4,10,5,1,3); p(4,21,5,1,3);
    p(4, 9,6,3,4); p(4,20,6,3,4);             // pigtails
    p(2, 11,5,10,9); p(2,10,7,1,5); p(2,21,7,1,5);
    p(0, 13,8,2,2); p(0,17,8,2,2);
    p(0, 14,12,4,1);                           // smile
    p(9, 15,3,2,2);                            // bow
    p(2, 14,14,4,2);                           // neck
    p(13, 10,16,12,6); p(13,9,17,2,4); p(13,21,17,2,4); // orange shirt
    p(10, 11,22,4,4); p(10,17,22,4,4);        // blue shorts
    p(2, 12,26,3,3); p(2,17,26,3,3);
    p(0, 11,28,5,2); p(0,16,28,5,2);
  },
  // 2: 小学生
  function(ctx, S) {
    const p = (ci,x,y,w,h) => _p(ctx,S,ci,x,y,w,h);
    p(4, 11,2,10,4); p(4,10,4,1,4); p(4,21,4,1,4);
    p(2, 11,4,10,9); p(2,10,6,1,5); p(2,21,6,1,5);
    p(0, 13,7,2,2); p(0,17,7,2,2);
    p(2, 14,13,4,2);
    p(1, 10,15,12,7); p(1,9,16,2,5); p(1,21,16,2,5); // white shirt
    p(10, 14,15,4,2);                          // blue collar
    p(14, 11,22,4,6); p(14,17,22,4,6);        // dark pants
    p(2, 12,27,3,2); p(2,17,27,3,2);
    p(0, 11,28,5,2); p(0,16,28,5,2);
    p(10, 22,15,4,8); p(8,23,16,3,7);         // backpack
  },
  // 3: 中学生
  function(ctx, S) {
    const p = (ci,x,y,w,h) => _p(ctx,S,ci,x,y,w,h);
    p(4, 12,2,8,3); p(4,11,3,1,3); p(4,20,3,1,3);
    p(2, 11,3,10,10); p(2,10,5,1,6); p(2,21,5,1,6);
    p(0, 13,7,2,2); p(0,17,7,2,2);
    p(2, 14,13,4,2);
    p(14, 10,15,12,8); p(14,9,16,2,6); p(14,21,16,2,6); // gakuran
    p(1, 15,15,2,8);                           // button line

function drawAura(ctx, stageIdx, size, pulse) {
  if (stageIdx < 8) return;
  pulse = (pulse === undefined) ? 1.0 : pulse;
  const cx = size / 2, cy = size / 2, r = size / 2;
  const pr = r * pulse; // pulsed radius — shrinks/grows with animation

  if (stageIdx === 8) {
    // Teal energy glow + 2 rings
    const g = ctx.createRadialGradient(cx, cy, pr*0.15, cx, cy, pr);
    g.addColorStop(0, 'rgba(0,200,167,0.42)');
    g.addColorStop(0.55, 'rgba(0,168,150,0.18)');
    g.addColorStop(1, 'rgba(0,100,90,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
    [0.60, 0.82].forEach((fr, i) => {
      ctx.strokeStyle = `rgba(0,220,180,${0.40 - i*0.14})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx, cy, pr*fr, 0, Math.PI*2); ctx.stroke();
    });
  }

  if (stageIdx === 9) {
    // Royal gold + purple: radial bg, 8 rays, 3 rings
    const g = ctx.createRadialGradient(cx, cy, pr*0.08, cx, cy, pr);
    g.addColorStop(0, 'rgba(240,192,64,0.72)');
    g.addColorStop(0.30, 'rgba(200,140,40,0.46)');
    g.addColorStop(0.62, 'rgba(120,48,176,0.32)');
    g.addColorStop(1, 'rgba(24,32,80,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
    for (let i = 0; i < 8; i++) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(i / 8 * Math.PI * 2 - Math.PI / 2);
      const rg = ctx.createLinearGradient(0, 0, 0, -pr * 0.88);
      rg.addColorStop(0, 'rgba(240,192,64,0.55)');
      rg.addColorStop(1, 'rgba(240,192,64,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.moveTo(-pr*0.07, 0); ctx.lineTo(pr*0.07, 0); ctx.lineTo(0, -pr*0.88);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    [0.42, 0.62, 0.80].forEach((fr, i) => {
      ctx.strokeStyle = `rgba(240,192,64,${0.58 - i*0.12})`;
      ctx.lineWidth = i === 0 ? 2.5 : 1.5;
      ctx.beginPath(); ctx.arc(cx, cy, pr*fr, 0, Math.PI*2); ctx.stroke();
    });
  }

  if (stageIdx === 10) {
    // Divine white-gold: radial bg, 16 rays, 4 rings, 8 sparkle stars
    const g = ctx.createRadialGradient(cx, cy, pr*0.04, cx, cy, pr);
    g.addColorStop(0,    'rgba(255,255,225,0.92)');
    g.addColorStop(0.12, 'rgba(255,232,120,0.80)');
    g.addColorStop(0.38, 'rgba(240,192,64,0.54)');
    g.addColorStop(0.68, 'rgba(200,160,40,0.22)');
    g.addColorStop(1,    'rgba(240,192,64,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
    for (let i = 0; i < 16; i++) {
      const isLong = i % 2 === 0;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(i / 16 * Math.PI * 2 - Math.PI / 2);
      const len = isLong ? pr*0.96 : pr*0.72;
      const hw  = isLong ? pr*0.078 : pr*0.040;
      const rg = ctx.createLinearGradient(0, 0, 0, -len);
      rg.addColorStop(0, `rgba(255,248,180,${isLong ? 0.74 : 0.42})`);
      rg.addColorStop(1, 'rgba(255,232,80,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.moveTo(-hw, 0); ctx.lineTo(hw, 0); ctx.lineTo(0, -len);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    [0.28, 0.46, 0.64, 0.82].forEach((fr, i) => {
      ctx.strokeStyle = `rgba(255,220,60,${0.84 - i*0.14})`;
      ctx.lineWidth = i === 0 ? 3 : 2;
      ctx.beginPath(); ctx.arc(cx, cy, pr*fr, 0, Math.PI*2); ctx.stroke();
    });
    [[0.16,0.10],[0.84,0.10],[0.06,0.50],[0.94,0.50],
     [0.16,0.90],[0.84,0.90],[0.50,0.04],[0.50,0.96]].forEach(([sx,sy]) => {
      const px = sx*size, py = sy*size, ss = size*0.030*pulse;
      ctx.fillStyle = 'rgba(255,255,212,0.96)';
      ctx.beginPath();
      ctx.moveTo(px,py-ss*2); ctx.lineTo(px+ss*0.5,py-ss*0.5);
      ctx.lineTo(px+ss*2,py); ctx.lineTo(px+ss*0.5,py+ss*0.5);
      ctx.lineTo(px,py+ss*2); ctx.lineTo(px-ss*0.5,py+ss*0.5);
      ctx.lineTo(px-ss*2,py); ctx.lineTo(px-ss*0.5,py-ss*0.5);
      ctx.closePath(); ctx.fill();
    });
  }
}

function _renderFrame(canvas, stageIdx, canvasSize, S, pulse) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvasSize, canvasSize);
  drawAura(ctx, stageIdx, canvasSize, pulse);
  const offset = (canvasSize - 32 * S) / 2;
  ctx.save();
  ctx.translate(offset, offset);
  (STAGE_DRAW[stageIdx] || STAGE_DRAW[0])(ctx, S);
  ctx.restore();
}

function drawChar(canvas, stageIdx, baseSize, S) {
  baseSize = baseSize || 120;
  S = S || 3;
  // Stage 8→10 に連れてキャンバスを拡大し、オーラがキャラクターを大きく包む
  // Stage 8: ×1.20  Stage 9: ×1.46  Stage 10: ×1.75
  const scale = stageIdx >= 8 ? [1.20, 1.46, 1.75][stageIdx - 8] : 1.0;
  const canvasSize = Math.round(baseSize * scale);
  canvas.width  = canvasSize;
  canvas.height = canvasSize;
  // CSS クラスの固定サイズを inline style で上書き
  canvas.style.width  = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  _renderFrame(canvas, stageIdx, canvasSize, S, 1.0);
  if (stageIdx >= 8) startAuraPulse(canvas, stageIdx, canvasSize, S);
}

function startAuraPulse(canvas, stageIdx, canvasSize, S) {
  stopAura(); // 念のため既存アニメを停止
  // Stage が上がるほど脈動を速く
  const speed = stageIdx === 8 ? 0.020 : stageIdx === 9 ? 0.032 : 0.050;
  let t = 0;
  function frame() {
    t += speed;
    // 最大半径 r、最小半径 r-16 になるよう固定16px差で脈動
    const r = canvasSize / 2;
    const pulse = 1 - (8 / r) * (1 - Math.sin(t));
    _renderFrame(canvas, stageIdx, canvasSize, S, pulse);
    auraAnimId = requestAnimationFrame(frame);
  }
  auraAnimId = requestAnimationFrame(frame);
  auraTimerId = setTimeout(stopAura, 60000); // 1分後に自動停止
}

function getStageIndex(pct) {
  return Math.min(10, Math.floor(pct / 10));
}

// ===== CODE BLOCK FORMATTING =====
function looksLikeCode(text) {
  const pat = /^\s*(def |class |for |while |if |else[:\s]|elif |try[:\s]|except|import |from |return |print\(|[a-z_]\w*\s*=\s*|[a-z_]\w*\()/;
  return text.split('\n').some(line => pat.test(line));
}

function formatQuestionText(text) {
  const parts = text.split(/\n\n+/);
  if (parts.length === 1) return `<div class="qt">${h(text)}</div>`;
  let html = `<div class="qt">${h(parts[0])}</div>`;
  for (let i = 1; i < parts.length; i++) {
    const part = parts[i];
    html += looksLikeCode(part)
      ? `<pre class="code-block">${h(part)}</pre>`
      : `<div class="question-sub">${h(part)}</div>`;
  }
  return html;
}

// ===== QUIZ START =====
function startQuiz(moduleIds, title) {
  quiz.title = title;
  quiz.index = 0;
  quiz.score = 0;
  quiz.weakTopics = [];
  quiz.selected = null;
  quiz.startParams = { moduleIds, title };

  let pool = [];
  if (moduleIds === null) {
    allModules.forEach(m =>
      m.questions.forEach(q => pool.push({ ...q, moduleId: m.module }))
    );
    quiz.moduleTag = '全モジュール';
  } else {
    moduleIds.forEach(id => {
      const m = allModules.find(m => m.module === id);
      if (m) m.questions.forEach(q => pool.push({ ...q, moduleId: m.module }));
    });
    quiz.moduleTag = `Module ${moduleIds[0]}`;
  }

  const count = moduleIds === null ? 20 : Math.min(10, pool.length);
  quiz.questions = shuffle(pool).slice(0, count);
  renderQuestion();
}

function retryQuiz() {
  startQuiz(quiz.startParams.moduleIds, quiz.startParams.title);
}

// ===== QUESTION =====
function renderQuestion() {
  const q = quiz.questions[quiz.index];
  const total = quiz.questions.length;
  const fillPct = (quiz.index / total * 100).toFixed(1);

  const options = q.options.map((opt, i) => {
    const key = String.fromCharCode(65 + i);
    const text = opt.replace(/^[A-D]\.\s*/, '');
    const sel = quiz.selected === key ? 'selected' : '';
    return `
      <button class="option-btn ${sel}" onclick="selectOption('${key}')">
        <span class="option-key">${key}</span>
        ${h(text)}
      </button>`;
  }).join('');

  render(`
    <div class="screen active">
      <div class="quiz-header">
        <div class="quiz-header-inner">
          <div class="progress-row">
            <span class="progress-label">問題 ${quiz.index + 1} / ${total}</span>
            <span class="module-tag">${h(quiz.moduleTag)}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${fillPct}%"></div>
          </div>
        </div>
      </div>
      <div class="screen-body">
        <div class="question-body">${formatQuestionText(q.question)}</div>
        ${options}
      </div>
      <div class="bottom-bar">
        <button class="btn btn-secondary" onclick="confirmQuit()">終了</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()"
          ${quiz.selected ? '' : 'disabled'}>回答する</button>
      </div>
    </div>
  `);
}

function selectOption(key) {
  quiz.selected = key;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    const k = String.fromCharCode(65 + i);
    const sel = k === key;
    btn.classList.toggle('selected', sel);
    const optKey = btn.querySelector('.option-key');
    optKey.style.background = sel ? 'var(--primary)' : '';
    optKey.style.color = sel ? 'white' : '';
  });
  const sub = document.getElementById('submit-btn');
  if (sub) sub.disabled = false;
}

function submitAnswer() {
  const q = quiz.questions[quiz.index];
  const isCorrect = quiz.selected === q.answer;
  if (isCorrect) {
    quiz.score++;
  } else if (!quiz.weakTopics.includes(q.topic)) {
    quiz.weakTopics.push(q.topic);
  }
  renderFeedback(q, quiz.selected, isCorrect);
}

// ===== FEEDBACK =====
function renderFeedback(q, userAnswer, isCorrect) {
  const currentPct = Math.round(quiz.score / quiz.questions.length * 100);
  const stageIdx = getStageIndex(currentPct);
  const correctOpt = q.options.find(o => o.startsWith(q.answer + '.'));
  const userOpt    = q.options.find(o => o.startsWith(userAnswer + '.'));
  const explanation = getFeedback(q.moduleId, q.id);
  const isLast = quiz.index >= quiz.questions.length - 1;

  const correctText = correctOpt ? correctOpt.replace(/^[A-D]\.\s*/, '') : '';
  const userText    = userOpt    ? userOpt.replace(/^[A-D]\.\s*/, '')    : userAnswer;

  render(`
    <div class="screen active">
      <div class="feedback-header">
        <div class="feedback-header-inner">
          <div class="char-mini">
            <canvas id="fb-char" width="120" height="120"></canvas>
            <div class="char-mini-info">
              <div class="char-mini-name">${h(STAGE_NAMES[stageIdx])}</div>
              <div class="char-mini-stage">STAGE ${stageIdx + 1}</div>
              <div class="char-mini-score">${quiz.score} / ${quiz.questions.length} 問正解</div>
            </div>
          </div>
          <div class="result-icon ${isCorrect ? 'correct' : 'wrong'}">
            ${isCorrect ? '✓' : '✗'}
          </div>
          <div class="result-label ${isCorrect ? 'correct' : 'wrong'}">
            ${isCorrect ? '正解！' : '不正解'}
          </div>
          ${!isCorrect ? `<div class="correct-answer-note">正解は ${h(q.answer)}: ${h(correctText)}</div>` : ''}
        </div>
      </div>
      <div class="screen-body">
        <div class="review-box">
          <div class="review-lbl">あなたの回答</div>
          <div class="review-val ${isCorrect ? 'correct' : 'wrong'}">${h(userAnswer)}: ${h(userText)}</div>
        </div>
        ${!isCorrect ? `
        <div class="review-box">
          <div class="review-lbl">正解</div>
          <div class="review-val correct">${h(q.answer)}: ${h(correctText)}</div>
        </div>` : ''}
        <div class="claude-card">
          <div class="claude-card-head">
            <div class="claude-icon">AI</div>
            <div class="claude-card-title">Claudeからの解説</div>
          </div>
          <div class="claude-card-text">${h(explanation)}</div>
        </div>
      </div>
      <div class="bottom-bar">
        <button class="btn btn-secondary" onclick="confirmQuit()">終了</button>
        <button class="btn btn-primary" onclick="nextQuestion()">
          ${isLast ? '結果を見る' : '次の問題 →'}
        </button>
      </div>
    </div>
  `);
  const fbCanvas = document.getElementById('fb-char');
  if (fbCanvas) drawChar(fbCanvas, stageIdx, 120, 3);
}

function nextQuestion() {
  quiz.index++;
  quiz.selected = null;
  if (quiz.index >= quiz.questions.length) {
    renderResults();
  } else {
    renderQuestion();
  }
}

// ===== RESULTS =====
function renderResults() {
  const total = quiz.questions.length;
  const pct   = Math.round(quiz.score / total * 100);
  const summary = getSummary(pct);
  const stageIdx = getStageIndex(pct);

  let msg = '';
  if (pct >= 95)      msg = '完璧です！';
  else if (pct >= 70) msg = 'よくできました！';
  else if (pct >= 50) msg = 'もう少しです！';
  else                msg = '基礎を復習しましょう';

  const weakList = quiz.weakTopics.length > 0
    ? quiz.weakTopics.map(t => `
        <div class="weak-item">
          <div class="weak-dot"></div>
          <div class="weak-text">${h(t)}</div>
        </div>`).join('')
    : '<p style="color:var(--gray);font-size:13px;padding:4px 0 12px;">苦手トピックなし 🎉</p>';

  render(`
    <div class="screen active">
      <div class="results-header">
        <div class="results-header-inner">
          <div class="char-showcase">
            <canvas id="result-char" width="160" height="160"></canvas>
            <div class="char-showcase-name">${h(STAGE_NAMES[stageIdx])}</div>
            <div class="char-showcase-stage">STAGE ${stageIdx + 1}</div>
          </div>
          <div class="score-inline">
            <div class="score-inline-num">${quiz.score}</div>
            <div class="score-inline-sep">/</div>
            <div class="score-inline-tot">${total}</div>
            <div class="score-inline-pct">${pct}%</div>
          </div>
          <div class="score-msg">${h(msg)}</div>
        </div>
      </div>
      <div class="screen-body">
        <div class="section-label">苦手トピック</div>
        ${weakList}
        <div class="claude-card" style="margin-top:8px;">
          <div class="claude-card-head">
            <div class="claude-icon">AI</div>
            <div class="claude-card-title">Claudeからの総評</div>
          </div>
          <div class="claude-card-text">${h(summary)}</div>
        </div>
      </div>
      <div class="bottom-bar">
        <button class="btn btn-secondary" onclick="renderHome()">ホームへ</button>
        <button class="btn btn-primary" onclick="retryQuiz()">もう一度</button>
      </div>
    </div>
  `);
  const resCanvas = document.getElementById('result-char');
  if (resCanvas) drawChar(resCanvas, stageIdx, 160, 4);
}

// ===== HELPERS =====
function confirmQuit() {
  if (confirm('クイズを終了してホームに戻りますか？')) {
    renderHome();
  }
}

// ===== START =====
init();
</script>
</body>
</html>
